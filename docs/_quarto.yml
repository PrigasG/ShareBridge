project:
  type: website
  output-dir: _site

website:
  title: "ShareBridge"
  description: "Portable Shiny app deployment for restricted Windows environments"
  site-url: "https://prigasg.github.io/ShareBridge"
  repo-url: "https://github.com/PrigasG/ShareBridge"
  repo-actions: [issue]
  favicon: images/favicon.svg

  navbar:
    logo: images/logo.svg
    logo-alt: "ShareBridge"
    title: false
    left:
      - text: "Get Started"
        href: getting-started.qmd
      - text: "Guides"
        menu:
          - text: "Publisher Guide"
            href: publisher-guide.qmd
          - text: "User Guide"
            href: user-guide.qmd
      - text: "Reference"
        href: reference.qmd
      - text: "Changelog"
        href: changelog.qmd
    right:
      - icon: github
        href: "https://github.com/PrigasG/ShareBridge"
        aria-label: GitHub

  sidebar: false

  page-footer:
    left: "Built with [Quarto](https://quarto.org)"
    right: "ShareBridge — portable Shiny for Windows"

  open-graph: true

format:
  html:
    theme: flatly
    css: styles.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
