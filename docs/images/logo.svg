<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 174 36">
  <!-- ── Icon ─────────────────────────────────────────────────────── -->
  <!-- Blue rounded square -->
  <rect width="36" height="36" rx="7.2" fill="#2563eb"/>

  <!-- Road deck -->
  <rect x="3" y="25.5" width="30" height="3" rx="1.5" fill="white"/>

  <!-- Left tower -->
  <rect x="9.5" y="8.5" width="3" height="19" rx="1.5" fill="white"/>

  <!-- Right tower -->
  <rect x="23.5" y="8.5" width="3" height="19" rx="1.5" fill="white"/>

  <!-- Main suspension cable — M silhouette -->
  <path d="M 3,25.5 L 11,8.5 Q 18,20.5 25,8.5 L 33,25.5"
        fill="none" stroke="white" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ──────────────────────────────────────────────────── -->
  <text x="47" y="24"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="17" font-weight="700" fill="#1e40af"
        letter-spacing="-0.2">ShareBridge</text>
</svg>
